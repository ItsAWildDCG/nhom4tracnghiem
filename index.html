<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PTIT Online Exam Portal</title>

    <link rel="stylesheet" href="style.css">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">

</head>

<body>

<div class="auth-container">

    <div class="card">

        <div class="header">
            <h1>PTIT Online Exam Portal</h1>
            <p id="auth-subtitle">Welcome back! Please log in to continue.</p>
        </div>

        <div class="form">

            <!-- USERNAME -->
            <label>Username</label>
            <div class="input-box">
                <i class="bx bx-user"></i>
                <input id="username" type="text" placeholder="Enter your username">
            </div>

            <!-- EMAIL -->
            <div id="email-field" class="hidden">
                <label>Email</label>
                <div class="input-box">
                    <i class="bx bx-envelope"></i>
                    <input id="email" type="email" placeholder="Enter your email">
                </div>
            </div>

            <!-- PASSWORD -->
            <label>Password</label>
            <div class="input-box">
                <i class="bx bx-lock"></i>
                <input id="password" type="password" placeholder="Enter your password">
                <i class="bx bx-show toggle" onclick="togglePassword(this)"></i>
            </div>

            <!-- CONFIRM PASSWORD -->
            <div id="confirm-field" class="hidden">
                <label>Confirm Password</label>
                <div class="input-box">
                    <i class="bx bx-lock"></i>
                    <input id="confirm-password" type="password" placeholder="Confirm password">
                </div>
            </div>

            <button id="auth-button">Log In</button>

            <p class="switch">
                <span id="switch-text">Don't have an account?</span>
                <a href="#" onclick="toggleMode()" id="switch-link">Sign Up</a>
            </p>

        </div>

    </div>

    <p class="footer">Secure authentication for online examinations</p>

</div>
<script src="script.js"></script>
</body>
</html>
