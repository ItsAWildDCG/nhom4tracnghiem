<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Online Exam Portal</title>
<link rel="stylesheet" href="style.css">
<link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
</head>

<body>

<!-- ================= AUTH PAGE ================= -->
<div id="auth-page" class="auth-container">

  <div class="card">

    <div class="header">
      <h1>Online Exam Portal</h1>
      <p id="auth-subtitle">Welcome back! Please log in to continue.</p>
    </div>

    <div class="form">

      <!-- USERNAME -->
      <label>Username</label>
      <div class="input-box">
        <i class="bx bx-user"></i>
        <input id="username" type="text" placeholder="Enter your username">
      </div>

      <!-- EMAIL (signup only) -->
      <div id="email-field" class="hidden">
        <label>Email</label>
        <div class="input-box">
          <i class="bx bx-envelope"></i>
          <input id="email" type="email" placeholder="Enter your email">
        </div>
      </div>

      <!-- PASSWORD -->
      <label>Password</label>
      <div class="input-box">
        <i class="bx bx-lock"></i>
        <input id="password" type="password" placeholder="Enter your password">
        <i class="bx bx-show toggle" onclick="togglePassword(this)"></i>
      </div>

      <!-- CONFIRM PASSWORD (signup only) -->
      <div id="confirm-field" class="hidden">
        <label>Confirm Password</label>
        <div class="input-box">
          <i class="bx bx-lock"></i>
          <input id="confirm-password" type="password" placeholder="Confirm password">
        </div>
      </div>

      <button id="auth-button" onclick="handleAuth()">Log In</button>

      <p class="switch">
        <span id="switch-text">Don't have an account?</span>
        <a onclick="toggleMode()" id="switch-link">Sign Up</a>
      </p>

    </div>

  </div>

  <p class="footer">Secure authentication for online examinations</p>

</div>


<!-- ================= DASHBOARD ================= -->
<div id="dashboard-page" class="hidden">

  <!-- TOP BAR -->
  <div class="topbar">

    <div class="logo">
      <i class="bx bxs-book"></i>
      <div>
        <strong>Online Exam Portal</strong>
        <span id="welcome-text">Welcome, user!</span>
      </div>
    </div>

    <button class="logout" onclick="logout()">
      <i class="bx bx-log-out"></i> Log Out
    </button>

  </div>


  <div class="content">

    <!-- PAGE TITLE -->
    <h2>Dashboard</h2>
    <p class="subtitle">Browse and access your exams</p>


    <!-- STATS -->
    <div class="stats">

      <div class="stat red">
        <p>Total Exams</p>
        <h3>2</h3>
        <i class="bx bx-book"></i>
      </div>

      <div class="stat green">
        <p>Free Access</p>
        <h3>1</h3>
        <i class="bx bx-time"></i>
      </div>

      <div class="stat orange">
        <p>Time Sensitive</p>
        <h3>1</h3>
        <i class="bx bx-alarm"></i>
      </div>

    </div>


    <!-- SEARCH BAR -->
    <div class="search-container">

      <div class="search-bar">
        <i class="bx bx-search"></i>
        <input type="text" placeholder="Search exams by name or subject...">
      </div>

      <button class="filter-btn">
        <i class="bx bx-filter"></i> Filters
      </button>

    </div>


    <!-- AVAILABLE EXAMS -->
    <div class="exam-section">

      <h3>Available Exams (2)</h3>

    </div>
    <div id="exam-list"></div>
  </div>

</div>

<div id="exam-page" class="hidden">

<h2 id="exam-title"></h2>
  
<div id="timer"></div>
  
<div class="question-box">

    <h3 id="question-text"></h3>

    <div id="options"></div>

</div>

<button onclick="nextQuestion()">Next Question</button>

</div>  
<script src="script.js"></script>
</body>
</html>
